<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Verification</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .check-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; font-size: 1.1rem; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        /* login বাটন স্টাইল */
        .login-btn {
            background-color: #007bff;
            color: white;
            border: 1px solid #007bff;
        }
        .login-btn:hover { background-color: #0056b3; }

        /* register বাটন স্টাইল */
        .register-btn {
            background-color: transparent;
            color: #555;
            border: 1px solid #ccc;
        }
        .register-btn:hover { background-color: #f8f9fa; border-color: #999; }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

        <a href="login1.php" class="btn login-btn">হ্যাঁ, আমার অ্যাকাউন্ট আছে (Login)</a>
        
        <a href="register1.php" class="btn register-btn">না, নতুন অ্যাকাউন্ট খুলবো (Register)</a>
    </div>

</html>
