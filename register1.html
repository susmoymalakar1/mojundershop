
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>
</head>
<body>
    <div class="form-box">
    <h2>নিবন্ধন করুন</h2>
    <form >
        <input type="text" name="name" placeholder="আপনার পুরো নাম" required>
        <input type="email" name="email" placeholder="ইমেইল এড্রেস" required>
        <input type="password" name="password" placeholder="পাসওয়ার্ড" required>
        <input type="password" name="confirm_password" placeholder="পাসওয়ার্ড নিশ্চিত করুন" required>
        <button type="submit" class="btn-primary">অ্যাকাউন্ট তৈরি করুন</button>
    </form>
</div>
</body>
</html>
